<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Absensi Enterprise</title>

<link rel="manifest" href="manifest.json">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "ISI_APIKEY",
authDomain: "ISI_DOMAIN",
databaseURL: "ISI_DB_URL",
projectId: "ISI_PROJECT",
storageBucket: "ISI_BUCKET",
messagingSenderId: "ISI_ID",
appId: "ISI_APPID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.absen = function(){
let nama = document.getElementById("nama").value;
let kelas = document.getElementById("kelas").value;
let status = document.getElementById("status").value;

if(!nama || !kelas || !status){
alert("Lengkapi data!");
return;
}

let tanggal = new Date().toLocaleDateString("id-ID");

push(ref(db,"absensi/"+tanggal),{
nama,kelas,status
});

alert("Absensi berhasil!");
}

onValue(ref(db,"absensi"),(snapshot)=>{
console.log(snapshot.val());
});
</script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:20px;
width:95%;
max-width:500px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4e73df;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
<h2>ABSENSI ENTERPRISE</h2>
<p>SMA Negeri 1 Mayong</p>

<input type="text" id="nama" placeholder="Nama">
<select id="kelas">
<option>X-A</option>
<option>X-B</option>
<option>XI-A</option>
<option>XI-B</option>
</select>

<select id="status">
<option>Hadir</option>
<option>Izin</option>
<option>Sakit</option>
<option>Alpha</option>
</select>

<button onclick="absen()">Kirim Absensi</button>

</div>

</body>
</html>
